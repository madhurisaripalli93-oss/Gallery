<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
</head>   <body>
    <h1>Image Gallery</h1>

    <div class="gallery">
        <img src="https://picsum.photos/id/1015/300/200" alt="Image 1">
        <img src="https://picsum.photos/id/1016/300/200" alt="Image 2">
        <img src="https://picsum.photos/id/1018/300/200" alt="Image 3">
        <img src="https://picsum.photos/id/1025/300/200" alt="Image 4">
        <img src="https://picsum.photos/id/1035/300/200" alt="Image 5">
        <img src="https://picsum.photos/id/1043/300/200" alt="Image 6">
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <span class="close">&times;</span>
        <button class="prev">&#10094;</button>
        <img class="lightbox-img" id="lightbox-img">
        <button class="next">&#10095;</button>
    </div>
<script>const galleryImages = document.querySelectorAll(".gallery img");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");
const closeBtn = document.querySelector(".close");
const prevBtn = document.querySelector(".prev");
const nextBtn = document.querySelector(".next");

let currentIndex = 0;

galleryImages.forEach((img, index) => {
    img.addEventListener("click", () => {
        currentIndex = index;
        showImage();
        lightbox.style.display = "flex";
    });
});

function showImage() {
    lightboxImg.src = galleryImages[currentIndex].src;
}

closeBtn.addEventListener("click", () => {
    lightbox.style.display = "none";
});

prevBtn.addEventListener("click", () => {
    currentIndex =
        (currentIndex - 1 + galleryImages.length) %
        galleryImages.length;
    showImage();
});

nextBtn.addEventListener("click", () => {
    currentIndex =
        (currentIndex + 1) %
        galleryImages.length;
    showImage();
});

lightbox.addEventListener("click", (e) => {
    if (e.target === lightbox) {
        lightbox.style.display = "none";
    }
});</script><style>*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f4f4f4;
    text-align:center;
    padding:20px;
}

h1{
    margin-bottom:20px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}

.gallery img{
    width:100%;
    border-radius:10px;
    cursor:pointer;
    transition:transform 0.4s ease;
}

.gallery img:hover{
    transform:scale(1.05);
}

.lightbox{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
}

.lightbox-img{
    max-width:80%;
    max-height:80%;
    border-radius:10px;
}

.close{
    position:absolute;
    top:20px;
    right:30px;
    color:white;
    font-size:40px;
    cursor:pointer;
}

.prev,.next{
    position:absolute;
    background:none;
    border:none;
    color:white;
    font-size:50px;
    cursor:pointer;
}

.prev{
    left:50px;
}

.next{
    right:50px;
}
  </style> </body>
</html>
